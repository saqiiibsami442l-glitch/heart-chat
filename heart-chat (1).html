<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Chat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#0a0a0f;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:18px}
.lock-heart{font-size:64px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.lock-title{font-size:26px;font-weight:700;color:#ff6b9d}
.lock-sub{font-size:13px;color:#666}
.lock-input-wrap{position:relative;width:280px}
.lock-input{width:100%;padding:13px 46px 13px 18px;border-radius:50px;border:1.5px solid #333;background:#1a1a2e;color:#fff;font-size:15px;font-family:'Nunito',sans-serif;outline:none;transition:.2s}
.lock-input:focus{border-color:#ff6b9d}
.eye-btn{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:#666;cursor:pointer;font-size:18px}
.lock-btn{width:280px;padding:14px;border-radius:50px;border:none;background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.lock-err{color:#ff4444;font-size:13px;min-height:18px;text-align:center}
#name-screen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:18px}
.name-input{width:280px;padding:13px 18px;border-radius:50px;border:1.5px solid #333;background:#1a1a2e;color:#fff;font-size:15px;font-family:'Nunito',sans-serif;outline:none}
.name-input:focus{border-color:#ff6b9d}
.name-btn{width:280px;padding:14px;border-radius:50px;border:none;background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
#chat-screen{display:none;flex-direction:column;height:100vh}
.chat-header{background:#1a1a2e;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a2a3e;flex-shrink:0}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#ff6b9d,#c44569);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header-info{flex:1}
.header-name{font-size:16px;font-weight:700;color:#ff6b9d}
.online-count{font-size:12px;color:#4caf50}
.hbtn{background:none;border:none;color:#888;cursor:pointer;font-size:20px;padding:4px}
.hbtn:hover{color:#ff6b9d}
.icon-btn{width:40px;height:40px;border-radius:50%;background:#1e1e30;border:1px solid #333;color:#888;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{border-color:#ff6b9d;color:#ff6b9d}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;background:#0a0a0f}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.msg-wrap{display:flex;flex-direction:column;max-width:72%}
.msg-wrap.mine{align-self:flex-end;align-items:flex-end}
.msg-wrap.other{align-self:flex-start;align-items:flex-start}
.msg-sender{font-size:11px;color:#ff6b9d;margin-bottom:2px;padding:0 4px;font-weight:600}
.msg-bubble{padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word}
.msg-wrap.mine .msg-bubble{background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;border-bottom-right-radius:4px}
.msg-wrap.other .msg-bubble{background:#1e1e30;color:#e0e0e0;border-bottom-left-radius:4px;border:1px solid #2a2a3e}
.msg-time{font-size:10px;color:#555;margin-top:2px;padding:0 4px}
.msg-img{max-width:200px;max-height:200px;border-radius:12px;object-fit:cover;cursor:pointer;display:block}
.system-msg{text-align:center;color:#444;font-size:11px;padding:4px;font-style:italic}
.chat-input-area{background:#1a1a2e;padding:10px 12px;border-top:1px solid #2a2a3e;flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.msg-input{flex:1;background:#0a0a0f;border:1.5px solid #2a2a3e;border-radius:24px;padding:10px 16px;color:#fff;font-size:14px;font-family:'Nunito',sans-serif;resize:none;max-height:100px;outline:none;line-height:1.4}
.msg-input:focus{border-color:#ff6b9d}
.send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#ff6b9d,#c44569);border:none;color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#img-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:999;align-items:center;justify-content:center;cursor:pointer}
#img-modal.show{display:flex}
#img-modal img{max-width:92%;max-height:92%;border-radius:12px}
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-heart">💗</div>
  <div class="lock-title">Heart Chat</div>
  <div class="lock-sub">Password enter karo</div>
  <div class="lock-input-wrap">
    <input class="lock-input" type="password" id="pw-input" placeholder="Password..." />
    <button class="eye-btn" id="eye-btn">👁</button>
  </div>
  <div class="lock-err" id="pw-err"></div>
  <button class="lock-btn" id="unlock-btn">Unlock 💗</button>
</div>

<div id="name-screen">
  <div class="lock-heart">💗</div>
  <div class="lock-title">Apna naam daalo</div>
  <div class="lock-sub" style="color:#666;font-size:13px;text-align:center;max-width:260px">Ye naam sab ko dikhega jab tum message karo ge</div>
  <input class="name-input" type="text" id="name-input" placeholder="Tumhara naam..." maxlength="20" />
  <button class="name-btn" id="name-btn">Chat Shuru Karo 💗</button>
</div>

<div id="chat-screen">
  <div class="chat-header">
    <div class="avatar">💗</div>
    <div class="header-info">
      <div class="header-name">Heart Chat</div>
      <div class="online-count" id="online-count">● connecting...</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="icon-btn" id="img-btn">📷</button>
      <input type="file" id="file-input" accept="image/*" style="display:none" />
      <button class="hbtn" id="logout-btn">🚪</button>
    </div>
  </div>
  <div class="chat-messages" id="msgs"></div>
  <div class="chat-input-area">
    <div class="input-row">
      <textarea class="msg-input" id="msg-input" placeholder="Message likho..." rows="1"></textarea>
      <button class="send-btn" id="send-btn">➤</button>
    </div>
  </div>
</div>

<div id="img-modal"><img id="modal-img" src="" /></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyA8oszrdlDggKxz5_0kdWvzokTL65ifC5U",
  authDomain: "my-chat-4d46d.firebaseapp.com",
  databaseURL: "https://my-chat-4d46d-default-rtdb.firebaseio.com",
  projectId: "my-chat-4d46d",
  storageBucket: "my-chat-4d46d.firebasestorage.app",
  messagingSenderId: "331317838007",
  appId: "1:331317838007:web:9e43c2366a13f49515cd32"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const PASSWORD = "dil=heart";
let myName = "";
let myId = "";
let lastDate = "";

// --- LOCK ---
document.getElementById('eye-btn').onclick = function(){
  const i = document.getElementById('pw-input');
  i.type = i.type === 'password' ? 'text' : 'password';
};

function checkPass(){
  const v = document.getElementById('pw-input').value.trim();
  if(v === PASSWORD){
    const saved = localStorage.getItem('hchat_name');
    if(saved){
      myName = saved;
      myId = localStorage.getItem('hchat_id') || Date.now().toString();
      localStorage.setItem('hchat_id', myId);
      showChat();
    } else {
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('name-screen').style.display = 'flex';
      setTimeout(()=>document.getElementById('name-input').focus(), 100);
    }
  } else {
    const err = document.getElementById('pw-err');
    err.textContent = "❌ Galat password!";
    setTimeout(()=>err.textContent='', 2000);
  }
}

document.getElementById('unlock-btn').onclick = checkPass;
document.getElementById('pw-input').addEventListener('keydown', function(e){ if(e.key==='Enter') checkPass(); });

// --- NAME ---
function startChat(){
  const n = document.getElementById('name-input').value.trim();
  if(!n){ alert("Naam zaruri hai!"); return; }
  myName = n;
  myId = Date.now().toString();
  localStorage.setItem('hchat_name', myName);
  localStorage.setItem('hchat_id', myId);
  showChat();
}

document.getElementById('name-btn').onclick = startChat;
document.getElementById('name-input').addEventListener('keydown', function(e){ if(e.key==='Enter') startChat(); });

// --- CHAT ---
function showChat(){
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('name-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  initChat();
}

function initChat(){
  // Online presence
  const presRef = db.ref('presence/' + myId);
  presRef.set({ name: myName, online: true });
  presRef.onDisconnect().remove();

  // Online count
  db.ref('presence').on('value', function(snap){
    const count = snap.exists() ? Object.keys(snap.val()).length : 0;
    document.getElementById('online-count').textContent = '● ' + count + ' online';
  });

  // Join msg
  db.ref('messages').push({
    type: 'system',
    text: myName + ' chat mein aa gaya 💗',
    ts: firebase.database.ServerValue.TIMESTAMP
  });

  // Load messages
  db.ref('messages').on('value', function(snap){
    if(!snap.exists()) return;
    const msgs = document.getElementById('msgs');
    msgs.innerHTML = '';
    lastDate = '';
    snap.forEach(function(child){
      renderMsg(child.val());
    });
    msgs.scrollTop = msgs.scrollHeight;
  });
}

function renderMsg(m){
  const msgs = document.getElementById('msgs');

  if(m.type === 'system'){
    const d = document.createElement('div');
    d.className = 'system-msg';
    d.textContent = m.text;
    msgs.appendChild(d);
    return;
  }

  const date = m.ts ? new Date(m.ts).toLocaleDateString('en-PK',{day:'numeric',month:'short'}) : '';
  if(date && date !== lastDate){
    const dd = document.createElement('div');
    dd.className = 'system-msg';
    dd.textContent = '— ' + date + ' —';
    msgs.appendChild(dd);
    lastDate = date;
  }

  const isMine = m.senderId === myId;
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + (isMine ? 'mine' : 'other');

  if(!isMine){
    const sn = document.createElement('div');
    sn.className = 'msg-sender';
    sn.textContent = m.senderName || 'Unknown';
    wrap.appendChild(sn);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if(m.type === 'image'){
    const img = document.createElement('img');
    img.src = m.imageData;
    img.className = 'msg-img';
    img.onclick = function(){
      document.getElementById('modal-img').src = m.imageData;
      document.getElementById('img-modal').classList.add('show');
    };
    bubble.appendChild(img);
  } else {
    bubble.textContent = m.text;
  }
  wrap.appendChild(bubble);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = m.ts ? new Date(m.ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}) : '';
  wrap.appendChild(time);
  msgs.appendChild(wrap);
}

// Send text
document.getElementById('send-btn').onclick = function(){
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  input.style.height = 'auto';
  db.ref('messages').push({
    type: 'text',
    text: text,
    senderName: myName,
    senderId: myId,
    ts: firebase.database.ServerValue.TIMESTAMP
  });
};

document.getElementById('msg-input').addEventListener('keydown', function(e){
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    document.getElementById('send-btn').click();
  }
});

document.getElementById('msg-input').addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Send image
document.getElementById('img-btn').onclick = function(){
  document.getElementById('file-input').click();
};

document.getElementById('file-input').onchange = function(event){
  const file = event.target.files[0];
  if(!file) return;
  event.target.value = '';
  const reader = new FileReader();
  reader.onload = function(e){
    db.ref('messages').push({
      type: 'image',
      imageData: e.target.result,
      senderName: myName,
      senderId: myId,
      ts: firebase.database.ServerValue.TIMESTAMP
    });
  };
  reader.readAsDataURL(file);
};

// Logout
document.getElementById('logout-btn').onclick = function(){
  localStorage.removeItem('hchat_name');
  localStorage.removeItem('hchat_id');
  location.reload();
};

// Image modal
document.getElementById('img-modal').onclick = function(){
  this.classList.remove('show');
};
</script>
</body>
</html>
